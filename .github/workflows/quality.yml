name: Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: travaa-shared-integration-database
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      DATABASE_URL: postgresql://unused:unused@localhost:5432/travaa_build
      BETTER_AUTH_SECRET: ci-only-secret-at-least-thirty-two-characters
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run db:check
      - run: bun run test
      - run: bun run test:integration
      - run: bun run lint
      - run: bunx tsc --noEmit
      - run: bun run build
